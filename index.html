<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Tradutor Juliana Rainen</title>
</head>

<body>
    <div class="caixa-maior">

        <textarea class="input-texto" placeholder="Digite o texto em português..."></textarea>

        <div class="controle">
            <select class="idioma">
                <option value="en">Inglês</option>
                <option value="de">Alemão</option>
                <option value="ja">Japonês</option>
                <option value="pt-BR">Português</option>
                <option value="es">Espanhol</option>
            </select>

            <button onclick="traduzir()" type="button">
                <img src="./img/traduzir.svg" alt="Traduzir">
            </button>

            <button onclick="ouvirVoz()" type="button">
                <img src="./img/microfone.svg" alt="Usar microfone">
            </button>
        </div>

        <div class="resultado">
            <h3 class="titulo-traducao">Tradução</h3>
            <p class="traducao">Sua tradução aparecerá aqui...</p>
        </div>

    </div>

    <script src="./script.js"></script>
</body>

</html>
