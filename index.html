<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="./style.css">
    <title>🌍 Rainen Translate</title>
</head>

<body>
    <div class="caixa-maior">

        <textarea class="input-texto" placeholder="Digite o texto em português..."></textarea>

        <div class="controle">
            <select class="idioma">
                <option value="en">Inglês 🇺🇸</option>
                <option value="es">Espanhol 🇪🇸</option>
                <option value="fr">Francês 🇫🇷</option>
                <option value="de">Alemão 🇩🇪</option>
                <option value="it">Italiano 🇮🇹</option>
                <option value="ja">Japonês 🇯🇵</option>
                <option value="ko">Coreano 🇰🇷</option>
                <option value="zh-CN">Chinês 🇨🇳</option>

            </select>

            <button onclick="traduzir()" type="button">
                <img src="./img/traduzir.svg" alt="Traduzir">
            </button>

            <button onclick="ouvirVoz()" type="button">
                <img src="./img/microfone.svg" alt="Usar microfone">
            </button>

            <input id="imagem-traducao" type="file" accept="image/*" onchange="traduzirImagem(event)" hidden>

            <button onclick="selecionarImagem()" type="button">
                <img src="./img/camera.svg" alt="Traduzir imagem">
            </button>
        </div>

        <div class="resultado">
            <h3 class="titulo-traducao">Tradução</h3>
            <p class="traducao">Sua tradução aparecerá aqui...</p>
        </div>

    </div>

    <script src="./scripts.js"></script>
</body>

</html>
